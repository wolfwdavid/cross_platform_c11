name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'Resources/Localizable.xcstrings'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'Resources/Localizable.xcstrings'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-guard-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate paid-runner fork guards
        run: ./tests/test_ci_self_hosted_guard.sh

      - name: Validate create-dmg version pinning
        run: ./tests/test_ci_create_dmg_pinned.sh

      - name: Validate c11 scheme test configuration
        run: ./tests/test_ci_scheme_testaction_debug.sh

      - name: Validate GhosttyKit checksum verification
        run: ./tests/test_ci_ghosttykit_checksum_verification.sh

      - name: Validate release asset guard
        run: node scripts/release_asset_guard.test.js

      - name: Validate current GhosttyKit checksum pin
        run: ./tests/test_ci_ghosttykit_checksum_present.sh

      - name: Run drawbridge gate tests
        run: python3 tests/drawbridge/test_gates.py

  remote-daemon-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: daemon/remote/go.mod

      - name: Run remote daemon tests
        working-directory: daemon/remote
        run: go test ./...

      - name: Validate remote daemon release assets
        run: ./tests/test_remote_daemon_release_assets.sh

  web-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

  build:
    # Proves the macOS app compiles against current sources. Does not run
    # xctest — upstream's 1099-test suite validates upstream code paths, which
    # is upstream's job. Fork-specific regressions get covered by targeted
    # tests as they land. Heavy regression suites (typing-lag, UI resolution)
    # can be reinstated in nightly.yml if needed.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15-xlarge
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          if [ ! -d "$XCODE_DIR" ]; then
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort | tail -n 1 || true)"
            [ -n "$XCODE_APP" ] || { echo "No Xcode.app found under /Applications" >&2; exit 1; }
            XCODE_DIR="$XCODE_APP/Contents/Developer"
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          XCODE_VERSION_OUTPUT="$(xcodebuild -version)"
          XCODE_VER="${XCODE_VERSION_OUTPUT%%$'\n'*}"
          echo "XCODE_VER=$XCODE_VER" >> "$GITHUB_ENV"
          echo "$XCODE_VERSION_OUTPUT"

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig
        # Required by the cmux scheme's Run Script build phase
        # (build-ghostty-cli-helper.sh), which compiles a small zig helper at
        # build time.
        run: |
          set -euo pipefail
          ZIG_REQUIRED="0.15.2"
          if command -v zig >/dev/null 2>&1 && zig version 2>/dev/null | grep -q "^${ZIG_REQUIRED}"; then
            echo "zig ${ZIG_REQUIRED} already installed"
            exit 0
          fi
          case "$(uname -m)" in
            arm64|aarch64) ARCH="aarch64" ;;
            x86_64) ARCH="x86_64" ;;
            *) echo "Unsupported CPU arch: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -fSL "https://ziglang.org/download/${ZIG_REQUIRED}/zig-${ARCH}-macos-${ZIG_REQUIRED}.tar.xz" -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          sudo mkdir -p /usr/local/bin /usr/local/lib
          sudo cp -f /tmp/zig-${ARCH}-macos-${ZIG_REQUIRED}/zig /usr/local/bin/zig
          sudo cp -rf /tmp/zig-${ARCH}-macos-${ZIG_REQUIRED}/lib /usr/local/lib/zig
          zig version

      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/GhosttyTabs-*
          key: deriveddata-build-${{ runner.os }}-${{ env.XCODE_VER }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-build-${{ runner.os }}-${{ env.XCODE_VER }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}-
            deriveddata-build-${{ runner.os }}-${{ env.XCODE_VER }}-
            deriveddata-build-${{ runner.os }}-

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: .ci-source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('GhosttyTabs.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          mkdir -p "$SOURCE_PACKAGES_DIR"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme c11 -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -resolvePackageDependencies

      - name: Build app
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme c11 -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Logic tests (gate)
        # Hard-fail gate: pure-logic suite (parsers, snapshots, persistence,
        # mailbox, theme). Runs in xctest-only, no DEV.app host. Fast (~45s)
        # and stable on shared-tenant runners.
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme c11-logic -configuration Debug \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            test

      - name: Host-bound unit tests (advisory)
        # Advisory while C11-99 Area C stabilizes the 32 expectation-timeout
        # failures clustered in 7 host-bound classes. Failures still surface
        # in the run log; they just don't gate merges. Flip back to hard-fail
        # once C11-99 Area C lands 5+ consecutive green runs.
        #
        # C11-109: the 7 flaky classes are explicitly -skip-testing'd below.
        # Each expectation timeout is ~10s; 32 timeouts dominated the ~6 min
        # wall time even though `continue-on-error: true` made them advisory.
        # Skipping recovers ~5 min per build while the remaining ~20 c11Tests
        # still provide host-runtime signal (AppKit, Ghostty, WKWebView,
        # UNNotificationCenter). Remove the skip flags when Area C lands.
        continue-on-error: true
        run: |
          set -euo pipefail
          SOURCE_PACKAGES_DIR="$PWD/.ci-source-packages"
          xcodebuild -project GhosttyTabs.xcodeproj -scheme c11-unit -configuration Debug \
            -only-testing:c11Tests \
            -skip-testing:c11Tests/AppDelegateShortcutRoutingTests \
            -skip-testing:c11Tests/GhosttyConfigTests \
            -skip-testing:c11Tests/NotificationBurstCoalescerTests \
            -skip-testing:c11Tests/TabManagerReopenClosedBrowserFocusTests \
            -skip-testing:c11Tests/TerminalNotificationDirectInteractionTests \
            -skip-testing:c11Tests/BrowserDeveloperToolsVisibilityPersistenceTests \
            -skip-testing:c11Tests/BrowserPanelHostContainerViewTests \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -disableAutomaticPackageResolution \
            -destination "platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            test
